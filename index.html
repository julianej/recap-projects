<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta -->
    <title>Your Page Title (55–60 chars recommended)</title>
    <meta
      name="description"
      content="Short and clear description of your page. Ideally 150–160 characters for SEO."
    />
    <meta name="keywords" content="keyword1, keyword2, keyword3" />
    <meta name="author" content="Your Name or Brand" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL (important for SEO to avoid duplicate content issues) -->
    <link rel="canonical" href="https://yourdomain.com/page-url" />

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Your Page Title" />
    <meta
      property="og:description"
      content="Short description for social sharing."
    />
    <meta property="og:url" content="https://yourdomain.com/page-url" />
    <meta
      property="og:image"
      content="https://yourdomain.com/images/preview.jpg"
    />
    <meta property="og:site_name" content="Your Site Name" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Your Page Title" />
    <meta
      name="twitter:description"
      content="Short description for Twitter sharing."
    />
    <meta
      name="twitter:image"
      content="https://yourdomain.com/images/preview.jpg"
    />

    <!-- Theme Color (mobile browsers) -->
    <meta name="theme-color" content="#ffffff" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="../components/header.css" />
    <link rel="stylesheet" href="../components/button.css" />
    <link rel="stylesheet" href="../components/card.css" />
  </head>
  <body>
    <header>
      <h1>Quiz App</h1>
    </header>
    <script src="script.js"></script>
  </body>
</html>
