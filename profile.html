<!doctype html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta -->
    <title>Your Page Title (55–60 chars recommended)</title>
    <meta
      name="description"
      content="Short and clear description of your page. Ideally 150–160 characters for SEO."
    />
    <meta name="keywords" content="keyword1, keyword2, keyword3" />
    <meta name="author" content="Your Name or Brand" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical URL (important for SEO to avoid duplicate content issues) -->
    <link rel="canonical" href="https://yourdomain.com/page-url" />

    <!-- Open Graph (Facebook, LinkedIn, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Your Page Title" />
    <meta
      property="og:description"
      content="Short description for social sharing."
    />
    <meta property="og:url" content="https://yourdomain.com/page-url" />
    <meta
      property="og:image"
      content="https://yourdomain.com/images/preview.jpg"
    />
    <meta property="og:site_name" content="Your Site Name" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Your Page Title" />
    <meta
      name="twitter:description"
      content="Short description for Twitter sharing."
    />
    <meta
      name="twitter:image"
      content="https://yourdomain.com/images/preview.jpg"
    />

    <!-- Theme Color (mobile browsers) -->
    <meta name="theme-color" content="#ffffff" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="global.css" />
    <link rel="stylesheet" href="../components/header.css" />
    <link rel="stylesheet" href="../components/button.css" />
    <link rel="stylesheet" href="../components/card.css" />
    <link rel="stylesheet" href="../components/footer.css" />
  </head>
  <body>
    <header>
      <h1>Quiz App</h1>
    </header>
    <main class="profile-container">
      <!-- User Card -->
      <section class="profile-card">
        <div class="profile-avatar"></div>

        <div class="profile-info">
          <h2 class="profile-name">Juliane Jeske</h2>
          <p class="profile-email">you@example.com</p>
        </div>
      </section>

      <!-- Stats -->
      <section class="profile-stats">
        <div class="stat-card">
          <h3>Book Marks</h3>
          <p class="stat-number">12</p>
        </div>

        <div class="stat-card">
          <h3>Questions Answered</h3>
          <p class="stat-number">45</p>
        </div>

        <div class="stat-card">
          <h3>Correct Answers</h3>
          <p class="stat-number">38</p>
        </div>
      </section>

      <!-- Actions -->
      <section class="profile-actions">
        <div class="toggle-container">
          <h2 id="dark-mode-label">Dark Mode</h2>
          <button
            class="toggle-button"
            type="button"
            aria-pressed="false"
            aria-labelledby="dark-mode-label"
          >
            <span class="toggle-button__track">
              <span class="toggle-button__thumb"></span>
            </span>
          </button>
        </div>

        <div class="toggle-container">
          <h2 id="notifications-label">Notifications</h2>
          <button
            class="toggle-button"
            type="button"
            aria-pressed="false"
            aria-labelledby="notifications-label"
          >
            <span class="toggle-button__track">
              <span class="toggle-button__thumb"></span>
            </span>
          </button>
        </div>

        <div class="toggle-container">
          <h2 id="gps-privacy-label">GPS Privacy</h2>
          <button
            class="toggle-button"
            type="button"
            aria-pressed="false"
            aria-labelledby="gps-privacy-label"
          >
            <span class="toggle-button__track">
              <span class="toggle-button__thumb"></span>
            </span>
          </button>
        </div>
      </section>
    </main>

    <footer class="footer">
      <nav class="footer__nav">
        <a href="index.html" class="footer__link">Home</a>
        <a href="bookmarks.html" class="footer__link">Bookmarks</a>
        <a href="profile.html" class="footer__link active">Profile</a>
      </nav>
    </footer>
  </body>
  <script src="script.js"></script>
</html>
